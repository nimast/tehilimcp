name = "tehilim-api"
main = "api/today.ts"
compatibility_date = "2024-12-01"

[site]
bucket = "./docs"

[[routes]]
pattern = "blessyourprompt.com/*"
custom_domain = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
